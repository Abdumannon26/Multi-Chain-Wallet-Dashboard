<section class="form card" aria-labelledby="form-heading">
  <h2 id="form-heading" class="visually-hidden">Ввод данных</h2>

  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="form__inner">
    <div class="form-row">
      <label class="form-field" for="chain-select">
        <span class="form-field__label">Сеть</span>
        <select
          id="chain-select"
          class="form-field__select"
          formControlName="chainId"
          aria-label="Выбор блокчейн-сети"
        >
          @for (chain of chains(); track chain.id) {
            <option [value]="chain.id">
              {{ chain.name }} ({{ chain.nativeCurrency.symbol }})
            </option>
          }
          @if (chains().length === 0) {
            <option value="">Загрузка сетей…</option>
          }
        </select>
      </label>

      <label class="form-field form-field--grow" for="address-input">
        <span class="form-field__label">Адрес кошелька</span>
        <input
          id="address-input"
          type="text"
          class="form-field__input"
          formControlName="address"
          placeholder="0x… или Solana-адрес"
          aria-label="Адрес кошелька"
          [attr.aria-invalid]="form.controls.address.invalid && form.controls.address.touched"
          aria-describedby="address-error"
          autocomplete="off"
        />
        @if (form.controls.address.invalid && form.controls.address.touched) {
          <span id="address-error" class="form-field__error" role="alert">
            {{ form.controls.address.hasError('invalidAddress') ? form.controls.address.getError('invalidAddress') : 'Введите адрес кошелька' }}
          </span>
        }
      </label>

      <div class="form-field form-field--button">
        <button
          type="submit"
          class="btn btn--primary"
          [disabled]="chains().length === 0"
          aria-label="Показать баланс"
        >
          Показать баланс
        </button>
      </div>
    </div>

    @if (form.controls.chainId.invalid && form.controls.chainId.touched) {
      <p class="form-error" role="alert">Выберите сеть</p>
    }
  </form>
</section>
